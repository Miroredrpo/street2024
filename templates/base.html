<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Street Customize Nepal | Custom Streetwear, Hoodies & Tees{% endblock %}</title>
    <meta name="description" content="Nepal's #1 custom streetwear brand. Design your own hoodies, t-shirts and jackets with your logo or artwork. Fast delivery across Nepal & India. Shop now." />
    <meta name="keywords" content="custom streetwear Nepal, customize hoodie Nepal, custom tshirt Kathmandu, streetwear brand Nepal, design your own clothes Nepal" />
    <meta name="author" content="Street Customize Nepal" />
    <link rel="canonical" href="https://www.streetcustomize.com.np/" />

    <meta name="google-site-verification" content="Gg6cdTCK6p2GGBin-4fIix7A9KZEC3YYpZHy3HKkqTg" />

    <meta property="og:title" content="Street Customize Nepal | Custom Streetwear" />
    <meta property="og:description" content="Design your own hoodies, tees & jackets. Custom streetwear delivered across Nepal & India." />
    <meta property="og:image" content="https://www.streetcustomize.com.np/static/og-image.jpg" />
    <meta property="og:url" content="https://www.streetcustomize.com.np/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>

        <!-- styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=2">

        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "Organization",
            "name": "Street Customize Nepal",
            "url": "https://www.streetcustomize.com.np",
            "logo": "https://www.streetcustomize.com.np/static/logo.png",
            "description": "Custom streetwear brand in Nepal offering personalized hoodies, tees, and jackets.",
            "address": {
                "@type": "PostalAddress",
                "addressCountry": "NP",
                "addressLocality": "Kathmandu"
            },
            "sameAs": [
                "https://www.instagram.com/streetcustomize",
                "https://www.facebook.com/streetcustomize"
            ]
        }
        </script>
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "Street Customize Nepal",
            "url": "https://www.streetcustomize.com.np"
        }
        </script>

    <!-- supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "{{ config['SUPABASE_URL'] }}";
        const SUPABASE_ANON_KEY = "{{ config['SUPABASE_KEY'] }}";
        window.supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    </script>
    <script>
        // set theme before paint
        if (localStorage.getItem('theme') !== 'light') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    {% block head %}{% endblock %}
</head>
<body>

    <!-- navbar -->
    <header class="navbar">
        <div class="logo">
            <a href="/">
                <h2>street2024customize</h2>
            </a>
        </div>
        <button class="nav-toggle" onclick="toggleMobileNav()" aria-label="Toggle menu" aria-expanded="false">
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
        </button>
        <nav class="nav-actions">
            <a id="admin-link" href="/admin" class="btn btn-sm btn-outline" style="display:none; margin-right: 10px;">Admin Dashboard</a>
            <a id="nav-orders-link" href="/orders" style="display:none; text-decoration:none; color:var(--text-main); font-weight:500; margin-right: 15px;">My Orders</a>

            <span id="user-greeting" class="nav-user-greeting" style="display:none;">
                Hello, <span id="user-name" class="nav-user-name"></span>
            </span>

            <button id="theme-btn" class="btn-icon" onclick="toggleTheme()" aria-label="Toggle Dark Mode" style="margin-right: 8px;">
                <span id="theme-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-moon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></span>
            </button>

            <select id="currency-select" class="currency-select" aria-label="Currency">
                <option value="NPR">NPR</option>
                <option value="INR">INR</option>
            </select>

            <button id="cart-btn" class="btn-icon" onclick="toggleCart()" aria-label="Open shopping cart">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
                <span id="cart-count" class="cart-badge" style="display:none;">0</span>
            </button>

            <button id="logout-btn" class="btn btn-ghost btn-sm" onclick="logout()" style="display:none;">Log out</button>
        </nav>
    </header>

    <!-- page -->
    {% block content %}{% endblock %}

    <!-- footer -->
    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 street2024customize. Made by EComm Labs.</p>
        </div>
    </footer>

    <!-- cart -->
    <div id="cart-overlay" class="cart-overlay" onclick="toggleCart()"></div>

    <aside id="cart-sidebar" class="cart-sidebar" role="dialog" aria-label="Shopping cart">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button class="cart-close-btn" onclick="toggleCart()" aria-label="Close cart">&times;</button>
        </div>

        <div id="cart-body" class="cart-body">
            <!-- filled by js -->
        </div>

        <div id="cart-footer" class="cart-footer" style="display:none;">
            <div class="cart-total-row">
                <span class="cart-total-label">Total</span>
                <span id="cart-total-value" class="cart-total-value">Rs. 0</span>
            </div>

            <button class="btn btn-primary cart-checkout-btn" style="width: 100%; margin-top: 1rem;" onclick="window.location.href='/checkout'">
                Proceed to Checkout
            </button>
        </div>
    </aside>

    <!-- toasts -->
    <div id="toast-container" class="toast-container"></div>

    <!-- scripts -->
    <script src="{{ url_for('static', filename='js/api.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/store.js') }}" defer></script>
    {% block scripts %}{% endblock %}

    <script>
        window.toggleMobileNav = function() {
            const nav = document.querySelector('.nav-actions');
            const toggle = document.querySelector('.nav-toggle');
            if (nav) nav.classList.toggle('nav-open');
            if (toggle) {
                const isOpen = nav && nav.classList.contains('nav-open');
                toggle.classList.toggle('nav-toggle-open', isOpen);
                toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            }
        };

        // sync theme
        if (document.documentElement.classList.contains('dark-mode')) {
            document.body.classList.add('dark-mode');
            document.getElementById('theme-icon').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-sun"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`;
        }

        window.toggleTheme = function() {
            document.documentElement.classList.add('theme-transition');
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            if (isDark) {
                document.documentElement.classList.add('dark-mode');
            } else {
                document.documentElement.classList.remove('dark-mode');
            }
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-icon').innerHTML = isDark ? `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-sun"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>` : `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-moon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`;
            setTimeout(() => document.documentElement.classList.remove('theme-transition'), 300);
        };
    </script>
</body>
</html>
