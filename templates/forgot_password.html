{% extends "base.html" %}

{% block title %}Forgot Password - Street Customize{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-header">
        <h2>Reset Password</h2>
        <p>Enter your email to receive a password reset link.</p>
    </div>

    <form id="forgot-password-form" onsubmit="handleForgotPassword(event)">
        <div class="form-group">
            <label for="reset-email">Email</label>
            <input type="email" id="reset-email" placeholder="you@example.com" required>
        </div>
        
        <p id="reset-msg" class="form-error is-hidden"></p>
        
        <button type="submit" id="reset-btn" class="btn btn-primary btn-lg btn-block mt-space-1">
            Send Reset Link
        </button>
    </form>

    <a href="/login" class="back-link">Back to log in</a>
</div>

<script>
    const sb = window.supabaseClient;

    window.handleForgotPassword = async function (e) {
        e.preventDefault();
        
        const email = document.getElementById('reset-email').value.trim();
        const btn = document.getElementById('reset-btn');
        const msgEl = document.getElementById('reset-msg');
        
        btn.textContent = 'Sending...';
        btn.disabled = true;
        msgEl.style.display = 'none';

        try {
            const { error } = await sb.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/reset-password',
            });
            
            if (error) throw error;
            
            msgEl.textContent = 'Password reset link sent! Check your email.';
            msgEl.className = 'form-success';
            msgEl.style.display = 'block';
            btn.textContent = 'Send Reset Link';
            btn.disabled = false;
        } catch (error) {
            msgEl.textContent = error.message;
            msgEl.className = 'form-error';
            msgEl.style.display = 'block';
            btn.textContent = 'Send Reset Link';
            btn.disabled = false;
        }
    };
</script>
{% endblock %}
