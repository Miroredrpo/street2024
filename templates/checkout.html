{% extends "base.html" %}

{% block title %}Checkout -  MaSha_Trends{% endblock %}

{% block content %}
<style>
    .checkout-container {
        max-width: 800px;
        margin: 2rem auto;
        padding: 0 1rem;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
    }
    @media (max-width: 768px) {
        .checkout-container {
            grid-template-columns: 1fr;
            gap: 1rem;
        }
        .checkout-section {
            padding: 1rem;
        }
    }
    .checkout-section {
        background: var(--bg-primary);
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .checkout-title {
        font-size: 1.5rem;
        font-family: 'Playfair Display', serif;
        margin-bottom: 1.5rem;
    }
    .order-summary-item {
        display: flex;
        justify-content: space-between;
        margin-bottom: 1rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border);
    }
    .order-summary-item img {
        width: 50px;
        height: 50px;
        object-fit: cover;
        border-radius: 4px;
        margin-right: 1rem;
    }
    .item-details {
        flex: 1;
    }
    .item-price {
        font-weight: bold;
    }
    .total-row {
        display: flex;
        justify-content: space-between;
        font-weight: bold;
        font-size: 1.2rem;
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 2px solid #333;
    }
    .discount-row {
        display: flex;
        justify-content: space-between;
        color: var(--success);
        margin-top: 0.5rem;
    }
    .coupon-section {
        margin-top: 2rem;
        display: flex;
        gap: 0.5rem;
    }
    .coupon-section input {
        flex: 1;
        padding: 0.75rem;
        border: 1px solid var(--border);
        border-radius: 4px;
    }
    .coupon-message {
        margin-top: 0.5rem;
        font-size: 0.9rem;
    }
    .success { color: var(--success); }
    .error { color: var(--error); }
    #shipping-address {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border);
        border-radius: 4px;
        margin-bottom: 1rem;
    }
    @media (max-width: 768px) {
        .checkout-container { grid-template-columns: 1fr; }
    }
</style>

<div class="checkout-container">
    <!-- Left Col: Form -->
    <div class="checkout-section">
        <h2 class="checkout-title">1. Shipping Details</h2>
        <div class="form-group">
            <label for="shipping-address">Delivery Address</label>
            <textarea id="shipping-address" rows="3" placeholder="Apartment, Street, City, Country" required></textarea>
        </div>
        
        <div style="margin-top: 2rem;">
            <p><strong>Payment Method:</strong> Cash on Delivery (COD)</p>
        </div>
        
        <button id="place-order-btn" class="btn btn-primary" style="width: 100%; margin-top: 2rem; padding: 1rem; font-size: 1.1rem;" onclick="processCheckout()">
            Place Order
        </button>
    </div>

    <!-- Right Col: Summary -->
    <div class="checkout-section">
        <h2 class="checkout-title">2. Order Summary</h2>
        <div id="checkout-items">
            <!-- Items injected here by JS -->
            <p>Loading your cart...</p>
        </div>
        
        <div class="coupon-section">
            <input type="text" id="coupon-code" placeholder="Enter coupon code">
            <button class="btn btn-outline" onclick="applyCoupon()">Apply</button>
        </div>
        <div id="coupon-message" class="coupon-message"></div>

        <div id="discount-row" class="discount-row" style="display: none;">
            <span>Discount (<span id="discount-percent"></span>%)</span>
            <span id="discount-amount">-Rs. 0</span>
        </div>
        
        <div class="total-row">
            <span>Total to pay</span>
            <span id="checkout-total">Rs. 0</span>
        </div>
    </div>
</div>

<script>
    let checkoutCartItems = [];
    let checkoutTotal = 0;
    let appliedCoupon = null;

    document.addEventListener('DOMContentLoaded', async () => {
        // Wait briefly for store.js auth to init if needed, though this page requires login.
        setTimeout(loadCheckoutData, 500); 
    });

    async function loadCheckoutData() {
        try {
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = '/';
                return;
            }

            const { data: cartData, error } = await window.supabaseClient
                .from('cart_items')
                .select('*, products(*)')
                .eq('user_id', session.user.id);
            
            if (error) throw error;

            checkoutCartItems = cartData;
            renderCheckoutItems();
        } catch (e) {
            console.error("Error loading checkout:", e);
            document.getElementById('checkout-items').innerHTML = '<p class="error">Failed to load cart items.</p>';
        }
    }

    function renderCheckoutItems() {
        const container = document.getElementById('checkout-items');
        
        if (!checkoutCartItems || checkoutCartItems.length === 0) {
            container.innerHTML = '<p>Your cart is empty.</p>';
            document.getElementById('place-order-btn').disabled = true;
            return;
        }

        container.innerHTML = '';
        checkoutTotal = 0;

        checkoutCartItems.forEach(item => {
            const prod = item.products;
            if (!prod) return;
            
            const lineTotal = prod.price * item.quantity;
            checkoutTotal += lineTotal;

            const div = document.createElement('div');
            div.className = 'order-summary-item';
            div.innerHTML = `
                <div style="display: flex;">
                    <img src="${prod.image_url || '/static/placeholder.png'}" alt="${prod.title}" onerror="this.src='/static/placeholder.png'">
                    <div class="item-details">
                        <div>${prod.title}</div>
                        ${item.size ? `<div style="color: var(--text-muted); font-size: 0.8rem;">Size: ${item.size}</div>` : ''}
                        <div style="color: var(--text-muted); font-size: 0.9rem;">Qty: ${item.quantity} x Rs. ${prod.price}</div>
                        <div class="checkout-item-timer" data-expires="${item.expires_at || ''}" style="color:var(--error-color); font-size:0.8rem; font-weight:600; margin-top:4px;"></div>
                    </div>
                </div>
                <div class="item-price">Rs. ${lineTotal}</div>
            `;
            container.appendChild(div);
        });

        updateCheckoutTotalDisplay();
        startCheckoutTimers();
    }

    let checkoutTimerInterval = null;

    function startCheckoutTimers() {
        if (checkoutTimerInterval) clearInterval(checkoutTimerInterval);
        
        function updateTimers() {
            const timers = document.querySelectorAll('.checkout-item-timer');
            let needRefresh = false;

            timers.forEach(timer => {
                const expiresAt = timer.getAttribute('data-expires');
                if (!expiresAt) return;
                
                const now = new Date();
                const expiry = new Date(expiresAt + (expiresAt.endsWith('Z') ? '' : 'Z'));
                const diffMs = expiry - now;

                if (diffMs <= 0) {
                    timer.textContent = 'Expired - Refreshing...';
                    needRefresh = true;
                } else {
                    const mins = Math.floor(diffMs / 60000);
                    const secs = Math.floor((diffMs % 60000) / 1000);
                    timer.textContent = `Reserved: ${mins}m ${secs}s left`;
                }
            });

            if (needRefresh) {
                // If anything expired, just reload data
                loadCheckoutData();
            }
        }
        
        updateTimers();
        checkoutTimerInterval = setInterval(updateTimers, 1000);
    }

    function updateCheckoutTotalDisplay() {
        let finalAmount = checkoutTotal;
        if (appliedCoupon) {
            const discountAmt = checkoutTotal * (appliedCoupon.discount_percentage / 100);
            finalAmount -= discountAmt;
            document.getElementById('discount-row').style.display = 'flex';
            document.getElementById('discount-percent').textContent = appliedCoupon.discount_percentage;
            document.getElementById('discount-amount').textContent = `-Rs. ${discountAmt.toFixed(2)}`;
        } else {
            document.getElementById('discount-row').style.display = 'none';
        }

        document.getElementById('checkout-total').textContent = `Rs. ${finalAmount.toFixed(2)}`;
    }

    async function applyCoupon() {
        const codeInput = document.getElementById('coupon-code').value.trim();
        const msgEl = document.getElementById('coupon-message');
        
        msgEl.textContent = 'Verifying...';
        msgEl.className = 'coupon-message';

        if (!codeInput) {
            msgEl.textContent = 'Please enter a code.';
            msgEl.className = 'coupon-message error';
            appliedCoupon = null;
            updateCheckoutTotalDisplay();
            return;
        }

        try {
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            const res = await fetch('/api/checkout/validate-coupon', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${session.access_token}`
                },
                body: JSON.stringify({ code: codeInput })
            });

            const data = await res.json();
            if (res.ok) {
                appliedCoupon = data;
                msgEl.textContent = `Coupon applied! ${data.discount_percentage}% off.`;
                msgEl.className = 'coupon-message success';
                updateCheckoutTotalDisplay();
            } else {
                appliedCoupon = null;
                msgEl.textContent = data.error || 'Invalid code';
                msgEl.className = 'coupon-message error';
                updateCheckoutTotalDisplay();
            }
        } catch (e) {
            msgEl.textContent = 'Error applying coupon';
            msgEl.className = 'coupon-message error';
            appliedCoupon = null;
            updateCheckoutTotalDisplay();
        }
    }

    async function processCheckout() {
        const address = document.getElementById('shipping-address').value.trim();
        if (!address) {
            alert('Please enter a shipping address');
            return;
        }

        const btn = document.getElementById('place-order-btn');
        btn.disabled = true;
        btn.textContent = 'Processing...';

        try {
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            
            const payload = { shipping_address: address };
            if (appliedCoupon) {
                payload.coupon_code = appliedCoupon.code;
            }

            const res = await fetch('/api/checkout', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${session.access_token}`
                },
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            if (res.ok) {
                alert('Order placed successfully! Your order ID is ' + data.order_id);
                window.location.href = '/'; // Reset to home
            } else {
                alert(data.error || 'Checkout failed');
                btn.disabled = false;
                btn.textContent = 'Place Order';
            }
        } catch (e) {
            console.error('Checkout error:', e);
            alert('An unexpected error occurred during checkout');
            btn.disabled = false;
            btn.textContent = 'Place Order';
        }
    }
</script>
{% endblock %}
