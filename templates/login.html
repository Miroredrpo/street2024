{% extends "base.html" %}

{% block title %}Log in / Sign up - Street Customize{% endblock %}

{% block content %}

<div class="auth-container">
    <div class="auth-header">
        <h2 id="auth-title">Log in</h2>
    </div>

    <form id="auth-form" onsubmit="handleAuth(event)">
        <div id="fullname-group" class="form-group is-hidden">
            <label for="auth-fullname">Full Name</label>
            <input type="text" id="auth-fullname" placeholder="Your name">
        </div>
        <div class="form-group">
            <label for="auth-email">Email</label>
            <input type="email" id="auth-email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
            <label for="auth-password">Password</label>
            <input type="password" id="auth-password" placeholder="••••••••" required>
        </div>
        <p id="auth-error" class="form-error is-hidden"></p>
        
        <button type="submit" id="auth-submit-btn" class="btn btn-primary btn-lg btn-block mt-space-1">
            Log in
        </button>
    </form>

    <div class="forgot-password-link" id="forgot-password-container">
        <a href="/forgot-password">Forgot password?</a>
    </div>

    <div class="form-toggle">
        <a href="#" id="auth-toggle-link" onclick="event.preventDefault(); toggleAuthMode();">
            Need an account? Sign up
        </a>
    </div>
</div>

<script>
    let isLoginMode = true;
    const sb = window.supabaseClient;

    document.addEventListener('DOMContentLoaded', async () => {
        // redirect if logged in
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
            window.location.replace('/');
        }
        
        // auth changes
        sb.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) {
                window.location.replace('/');
            }
        });
    });

    window.toggleAuthMode = function () {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').textContent = isLoginMode ? 'Log in' : 'Sign up';
        document.getElementById('auth-submit-btn').textContent = isLoginMode ? 'Log in' : 'Create account';
        document.getElementById('auth-toggle-link').textContent = isLoginMode ? 'Need an account? Sign up' : 'Already have an account? Log in';
        document.getElementById('fullname-group').style.display = isLoginMode ? 'none' : 'block';
        document.getElementById('forgot-password-container').style.display = isLoginMode ? 'block' : 'none';
        hideAuthError();
    };

    window.handleAuth = async function (e) {
        e.preventDefault();
        hideAuthError();

        const email = document.getElementById('auth-email').value.trim();
        const password = document.getElementById('auth-password').value;
        const btn = document.getElementById('auth-submit-btn');
        const originalText = btn.textContent;

        btn.textContent = 'Processing...';
        btn.disabled = true;

        try {
            if (isLoginMode) {
                const { error } = await sb.auth.signInWithPassword({ email, password });
                if (error) throw error;
            } else {
                const fullName = document.getElementById('auth-fullname').value.trim();
                const { data, error } = await sb.auth.signUp({
                    email,
                    password,
                    options: { data: { full_name: fullName } }
                });
                if (error) throw error;
                if (data?.user && data?.session === null) {
                    toggleAuthMode();
                    showToast('Account created! Check your email to verify.', 'success');
                }
                
                // session without email confirm
                toggleAuthMode();
                showToast('Account created successfully! Please log in.', 'success');
            }
            // login fallback
            setTimeout(() => {
                if (window.location.pathname === '/login') {
                    window.location.replace('/');
                }
            }, 800);
        } catch (error) {
            showAuthError(error.message);
            btn.textContent = originalText;
            btn.disabled = false;
        }
    };

    function showAuthError(msg) {
        const el = document.getElementById('auth-error');
        if (el) { el.textContent = msg; el.style.display = 'block'; }
    }

    function hideAuthError() {
        const el = document.getElementById('auth-error');
        if (el) { el.textContent = ''; el.style.display = 'none'; }
    }
</script>
{% endblock %}
