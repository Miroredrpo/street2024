{% extends 'base.html' %}

{% block title %}My Orders - Street Customize{% endblock %}

{% block content %}
<div class="orders-container">
    <h2>Order Tracking</h2>
    <div class="orders-search-row">
        <input type="text" id="instagram-search" placeholder="Enter your Instagram username">
        <button class="btn btn-primary" onclick="loadOrdersByInstagram()">Track</button>
    </div>
    <div id="orders-list">
        <p>Enter your Instagram username to view your orders.</p>
    </div>
</div>

<script>
async function loadOrdersByInstagram() {
    const list = document.getElementById('orders-list');
    const input = document.getElementById('instagram-search');
    const raw = input.value.trim();
    const username = raw.replace(/@/g, '');

    if (!username) {
        list.innerHTML = '<p>Please enter your Instagram username.</p>';
        return;
    }

    try {
        const res = await fetch('/api/orders/lookup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ instagram_username: username })
        });

        const orders = await res.json();
        if (!res.ok) throw new Error(orders.error || 'Failed to load orders');

        if (!orders || orders.length === 0) {
            list.innerHTML = '<p>No orders found for that Instagram username.</p>';
            return;
        }

        list.innerHTML = orders.map(o => {
            const sym = (o.currency === 'INR') ? '₹' : 'Rs. ';
            return `
            <div class="order-card">
                <div class="order-header">
                    <div>
                        <strong>Order #${o.order_number || o.id.substring(0, 4)}</strong><br>
                        <small class="order-meta-date">${new Date(o.created_at).toLocaleDateString()}</small>
                    </div>
                    <div class="order-header-right">
                        <div class="order-status status-${o.status}">${o.status}</div>
                        <div class="order-total">${sym}${parseFloat(o.total_amount).toFixed(2)}</div>
                    </div>
                </div>
                
                <div class="order-items">
                    ${o.order_items.map(item => `
                        <div class="order-item">
                            <img src="${item.products ? item.products.image_url : ''}" alt="Product" class="order-item-img" onerror="this.src='/static/placeholder.png'">
                            <div class="order-item-body">
                                <div class="order-item-title">${item.products ? item.products.title : 'Product'}</div>
                                <div class="order-item-meta">
                                    Qty: ${item.quantity} ${item.size ? `| Size: ${item.size}` : ''} ${item.color ? `| Color: ${item.color}` : ''}
                                </div>
                            </div>
                            <div class="order-item-price">
                                ${sym}${parseFloat(item.price_at_time).toFixed(2)}
                            </div>
                        </div>
                    `).join('')}
                </div>

                ${o.status === 'pending' ? `
                    <div class="order-note">
                        To cancel this order or modify it, please message us on <a href="https://www.instagram.com/street2024customize/" target="_blank">Instagram</a> with your Order Number: <strong>${o.order_number || o.id.substring(0, 4)}</strong>
                    </div>
                ` : ''}
                
                <div class="order-shipping">
                    <strong>Shipping To:</strong> ${escapeHtml(o.shipping_address)}
                </div>
            </div>
        `}).join('');

    } catch (err) {
        list.innerHTML = `<p class="order-error">Error loading orders: ${err.message}</p>`;
    }
}

async function cancelOrder(orderId) {
    if (!confirm("Are you sure you want to cancel this order? This action cannot be undone.")) return;
    
    try {
        const { data: { session } } = await window.supabaseClient.auth.getSession();
        const token = session ? session.access_token : '';
        const res = await fetch(`/api/orders/${orderId}/cancel`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });
        
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to cancel order');
        
        showToast("Order cancelled successfully", "success");
        loadMyOrders();
    } catch (err) {
        showToast(err.message, "error");
    }
}

function escapeHtml(unsafe) {
    return (unsafe || '').toString()
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}
</script>
{% endblock %}
